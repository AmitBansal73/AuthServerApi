name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-nestin-dev
  CONTAINER_APP_NAME: auth-server-app
  CONTAINER_APP_ENV: cae-nestin-dev
  IMAGE: amitbansal73/auth-server:latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp create \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --environment ${{ env.CONTAINER_APP_ENV }} \
            --image ${{ env.IMAGE }} \
            --target-port 8080 \
            --ingress external \
            --min-replicas 0 \
            --max-replicas 3 \
            --env-vars \
              ASPNETCORE_ENVIRONMENT=Production \
              ConnectionStrings__default-connection=secretref:db-connection-string \
            --secrets \
              db-connection-string=${{ secrets.DB_CONNECTION_STRING }}
